<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrackMaster">
<meta name="theme-color" content="#07080f">

<title>TrackMaster</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#07080f;--s1:#0f1018;--s2:#161820;--card:#1c1e2a;
  --b1:#252738;--b2:#2e3145;
  --cyan:#00d4ff;--orange:#ff6b35;--green:#00e676;
  --yellow:#ffca28;--red:#ff5252;
  --text:#eceef8;--muted:#7b7f9e;--dim:#4a4d6a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(0,212,255,.06) 0%,transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 110%,rgba(255,107,53,.05) 0%,transparent 60%);
  pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,212,255,.025)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025)1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;}
.wrap{max-width:900px;margin:0 auto;padding:0 16px 48px;position:relative;z-index:1;}
header{padding:22px 0 18px;border-bottom:1px solid var(--b1);margin-bottom:28px;}
.hdr{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--cyan),var(--orange));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 0 20px rgba(0,212,255,.25);flex-shrink:0;}
.brand-name{font-size:20px;font-weight:800;}
.brand-name em{color:var(--cyan);font-style:normal;}
.brand-sub{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:13px 20px;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .17s;border:none;text-decoration:none;white-space:nowrap;min-height:48px;touch-action:manipulation;}
.btn-cta{background:var(--cyan);color:#000;width:100%;}
.btn-cta:active{background:#1ae8ff;transform:scale(.98);}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--b2);}
.btn-ghost:active{border-color:var(--cyan);color:var(--cyan);}
.btn-red{background:rgba(255,82,82,.12);color:var(--red);border:1px solid rgba(255,82,82,.25);}
.btn-red:active{background:rgba(255,82,82,.22);}
.btn-sm{padding:9px 16px;font-size:13px;border-radius:9px;min-height:40px;}
.btn-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;padding:6px 10px;border-radius:6px;min-height:36px;min-width:36px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.btn-del:active{color:var(--red);}

/* --- FILE INPUT: off-screen, NOT display:none (iPhone fix) --- */
#fi{position:fixed;bottom:-200px;left:-200px;width:1px;height:1px;opacity:0;pointer-events:none;}

/* --- Upload label: triggers #fi on all devices including iPhone --- */
.upload-label{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:15px 20px;border-radius:12px;background:var(--cyan);color:#000;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .17s;min-height:52px;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.upload-label:active{background:#1ae8ff;transform:scale(.98);}

/* --- Loading bar --- */
.loading-bar{display:none;align-items:center;justify-content:center;gap:10px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:10px;padding:12px 16px;margin-top:12px;font-size:13px;color:var(--cyan);font-weight:600;}
.loading-bar.visible{display:flex;}
.spinner{width:16px;height:16px;border:2px solid rgba(0,212,255,.3);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* --- Drag & drop: desktop/iPad only --- */
.dropzone{display:none;border:2px dashed var(--b2);border-radius:12px;padding:24px;text-align:center;color:var(--muted);font-size:13px;margin-top:12px;transition:all .2s;cursor:pointer;}
.dropzone.drag-over{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.04);}
@media(hover:hover) and (pointer:fine){.dropzone{display:block;}}

.upload-card{background:var(--s2);border:1px solid var(--b1);border-radius:18px;padding:24px;margin-bottom:20px;}
.upload-card h2{font-size:15px;font-weight:700;margin-bottom:6px;}
.upload-card p{font-size:12px;color:var(--muted);margin-bottom:16px;}
.fmts{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;}
.fmt{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:6px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;border:1px solid var(--b1);}
.fmt.w{border-color:rgba(79,195,247,.4);color:#4fc3f7;background:rgba(79,195,247,.07);}
.fmt.x{border-color:rgba(105,240,174,.4);color:#69f0ae;background:rgba(105,240,174,.07);}
.fmt.c{border-color:rgba(255,202,40,.4);color:var(--yellow);background:rgba(255,202,40,.07);}

.file-list{display:flex;flex-direction:column;gap:7px;margin-top:14px;}
.fi{display:flex;align-items:center;justify-content:space-between;background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:11px 14px;}
.fi.ok{border-color:rgba(0,230,118,.25);}
.fi.error{border-color:rgba(255,82,82,.25);}
.fi-l{display:flex;align-items:center;gap:9px;}
.fi-name{font-size:13px;font-weight:600;}
.fi-n{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:1px;}
.fi-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;}
.fi-badge.ok{color:var(--green);background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2);}
.fi-badge.error{color:var(--red);background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.2);}
.fi-badge.loading{color:var(--yellow);background:rgba(255,202,40,.1);border:1px solid rgba(255,202,40,.2);}

.stats-bar{display:flex;background:var(--s2);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:18px;}
.stat{flex:1;padding:12px 10px;text-align:center;border-right:1px solid var(--b1);}
.stat:last-child{border-right:none;}
.stat-v{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--cyan);}
.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}

.bulk-link{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:17px;border-radius:14px;font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--cyan),#0099cc);color:#000;text-decoration:none;font-family:'Outfit',sans-serif;box-shadow:0 4px 24px rgba(0,212,255,.28);transition:all .2s;margin-bottom:8px;touch-action:manipulation;}
.bulk-link:active{transform:scale(.98);}
.bulk-link-sub{font-size:11px;font-weight:500;opacity:.7;display:block;margin-top:2px;}

.manual-card{background:var(--s2);border:1px solid var(--b1);border-radius:18px;padding:20px;margin-bottom:20px;}
.manual-card h2{font-size:15px;font-weight:700;margin-bottom:14px;}
.manual-row{display:flex;flex-direction:column;gap:9px;}
.manual-row input{width:100%;background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:13px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border .18s;min-height:48px;}
.manual-row input:focus{border-color:var(--cyan);}

.orders-card{background:var(--s2);border:1px solid var(--b1);border-radius:18px;padding:20px;margin-bottom:20px;}
.orders-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap;}
.orders-title{font-size:15px;font-weight:700;}
.search-wrap{position:relative;flex:1;min-width:140px;}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}
.search-wrap input{width:100%;background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:10px 12px 10px 32px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;min-height:42px;}
.search-wrap input:focus{border-color:var(--cyan);}
.orders-list{display:flex;flex-direction:column;gap:8px;}

.orow{background:var(--card);border:1px solid var(--b1);border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:10px;animation:fadeUp .22s ease forwards;opacity:0;transform:translateY(5px);}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
.orow-num{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;min-width:22px;text-align:right;flex-shrink:0;}
.orow-info{flex:1;min-width:0;}
.orow-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.orow-track{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.orow-btns{display:flex;gap:5px;flex-shrink:0;}
.track-one{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;border-radius:9px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25);color:var(--cyan);font-size:12px;font-weight:700;text-decoration:none;font-family:'Outfit',sans-serif;white-space:nowrap;min-height:36px;touch-action:manipulation;}
.track-one:active{background:rgba(0,212,255,.22);}

.notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--b2);border-radius:12px;padding:13px 20px;font-size:13px;z-index:200;opacity:0;transition:all .24s;max-width:90vw;text-align:center;white-space:nowrap;}
.notif.show{transform:translateX(-50%) translateY(0);opacity:1;}
.notif.ok{border-color:rgba(0,230,118,.35);}
.notif.err{border-color:rgba(255,82,82,.35);}
.notif.info{border-color:rgba(0,212,255,.35);}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="hdr">
    <div class="brand">
      <div class="brand-icon">&#x1F4E6;</div>
      <div>
        <div class="brand-name">Track<em>Master</em></div>
        <div class="brand-sub">carica file - traccia su 17Track</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-ghost btn-sm" id="installBtn" style="display:none" onclick="installApp()">&#x1F4F2; Aggiungi a schermata</button>
      <button class="btn btn-red btn-sm" onclick="resetAll()">&#x1F5D1; Svuota</button>
    </div>
  </div>
</header>

<!-- iPhone fix: input is off-screen (never display:none). label triggers it. -->
<input type="file" id="fi" multiple accept=".doc,.docx,.xlsx,.xls,.csv,.txt">

<div class="upload-card">
  <h2>&#x1F4C1; Carica file</h2>
  <p>Seleziona uno o piu file con gli ordini</p>
  <div class="fmts">
    <span class="fmt w">&#x1F4DD; .doc / .docx</span>
    <span class="fmt x">&#x1F4CA; .xlsx</span>
    <span class="fmt c">&#x1F4CB; .csv</span>
  </div>
  <label for="fi" class="upload-label">&#x2B06;&#xFE0F; Scegli file</label>
  <div class="dropzone" id="dropzone">&#x1F4C2; Trascina i file qui (desktop/iPad)</div>
  <div class="loading-bar" id="loadingBar">
    <div class="spinner"></div>
    <span id="loadingMsg">Lettura in corso...</span>
  </div>
  <div class="file-list" id="fileList"></div>
</div>

<div id="statsBar" class="stats-bar hidden">
  <div class="stat"><div class="stat-v" id="sTot">0</div><div class="stat-l">Totale</div></div>
  <div class="stat"><div class="stat-v" id="sNamed" style="color:var(--green)">0</div><div class="stat-l">Con nome</div></div>
  <div class="stat"><div class="stat-v" id="sAnon" style="color:var(--yellow)">0</div><div class="stat-l">Senza nome</div></div>
</div>

<div id="bulkSection" class="hidden">
  <div id="bulkLinks"></div>
</div>

<div class="manual-card">
  <h2>&#x270F;&#xFE0F; Aggiungi manualmente</h2>
  <div class="manual-row">
    <input type="text" id="manName" placeholder="Nome cliente (opzionale)" autocomplete="off">
    <input type="text" id="manTrack" placeholder="Codice tracking *" autocomplete="off" autocapitalize="characters">
    <button class="btn btn-cta" onclick="addManual()">Aggiungi codice</button>
  </div>
</div>

<div id="ordersCard" class="orders-card hidden">
  <div class="orders-header">
    <div class="orders-title">&#x1F4E6; Ordini</div>
    <div class="search-wrap">
      <span class="search-ico">&#x1F50D;</span>
      <input type="text" id="searchInput" placeholder="Cerca..." oninput="renderOrders()">
    </div>
  </div>
  <div class="orders-list" id="ordersList"></div>
</div>

</div>
<div class="notif" id="notif"></div>

<script>
// -------------------------------------------------------
// STATE
// -------------------------------------------------------
var STORE = 'trackmaster_v7';
var MAX_PER_LINK = 40;
var codes = loadSaved();
var files = [];

function loadSaved() {
  try {
    var d = localStorage.getItem(STORE);
    return d ? JSON.parse(d) : [];
  } catch(e) { return []; }
}

function save() {
  try { localStorage.setItem(STORE, JSON.stringify(codes)); } catch(e) {}
}

// -------------------------------------------------------
// TRACKING DETECTION
// Strict: 2-4 uppercase letters + digits + optional trailing letters
// No hyphens, no spaces
// Pattern: /^[A-Z]{2,4}[0-9]+[A-Z]{0,4}$/
// Examples: JCZ0317215013DH (3 prefix), YT1234567890 (2 prefix), LV123456789CN
// -------------------------------------------------------
var TRACK_RX = /^[A-Z]{2,4}[0-9]+[A-Z]{0,4}$/;

function isTracking(s) {
  if (!s) return false;
  s = s.trim().toUpperCase();
  if (s.indexOf('-') !== -1) return false;
  if (s.indexOf(' ') !== -1) return false;
  if (s.length < 6 || s.length > 30) return false;
  return TRACK_RX.test(s);
}

// -------------------------------------------------------
// NAME DETECTION
// 2+ words, only letters (including accented)
// Strip country codes (IT, DE...) and clothing sizes
// -------------------------------------------------------
var NAME_WORD_RX = /^[A-Za-z\u00C0-\u00FF'][A-Za-z\u00C0-\u00FF'\-]*[A-Za-z\u00C0-\u00FF']$|^[A-Za-z\u00C0-\u00FF']{2,}$/;
var SIZE_RX = /^(2?XL|XS|[SML])$/i;
var COUNTRY_RX = /^[A-Z]{2}$/;

function isName(s) {
  s = (s || '').trim();
  var words = s.split(/\s+/);
  if (words.length < 2) return false;
  return words.every(function(w) {
    return NAME_WORD_RX.test(w) && !SIZE_RX.test(w) && !COUNTRY_RX.test(w);
  });
}

function cleanName(s) {
  var out = s.replace(/[^A-Za-z\u00C0-\u00FF'\s]/g, ' ').replace(/\s+/g, ' ').trim();
  var words = out.split(' ');
  while (words.length && (COUNTRY_RX.test(words[0]) || SIZE_RX.test(words[0]))) words.shift();
  while (words.length && (COUNTRY_RX.test(words[words.length-1]) || SIZE_RX.test(words[words.length-1]))) words.pop();
  return words.join(' ').trim();
}

// -------------------------------------------------------
// TEXT PARSER
// - Converts to uppercase for tracking detection
// - Keeps original case for name extraction
// - Name is searched AFTER tracking code (per spec)
// - Falls back to before, next lines, prev lines
// -------------------------------------------------------
function parseText(text) {
  if (!text) return [];

  // Remove Chinese/Japanese characters
  text = text.replace(/[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]/g, ' ');

  var upperText = text.toUpperCase();
  var lines = text.split(/\r?\n/).map(function(l) { return l.trim(); });
  var upperLines = upperText.split(/\r?\n/).map(function(l) { return l.trim(); });

  var results = [];
  var seen = {};

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var upperLine = upperLines[i];
    if (!upperLine) continue;

    var tokens = upperLine.split(/[\s,;|\t]+/).filter(Boolean);
    var trackTokens = tokens.filter(isTracking);
    if (!trackTokens.length) continue;

    for (var t = 0; t < trackTokens.length; t++) {
      var trk = trackTokens[t];
      if (seen[trk]) continue;
      seen[trk] = true;

      var name = '-';
      var trkIdx = upperLine.indexOf(trk);

      // Strategy A: name AFTER tracking code on same line
      var afterRaw = line.substring(trkIdx + trk.length).replace(/^[\s,;:\-|]+/, '').trim();
      if (afterRaw) {
        var ca = cleanName(afterRaw);
        if (isName(ca)) {
          name = ca;
        } else {
          var aw = afterRaw.split(/\s+/).filter(Boolean);
          outer1:
          for (var w = 0; w < aw.length; w++) {
            for (var wl = Math.min(4, aw.length - w); wl >= 2; wl--) {
              var ph1 = cleanName(aw.slice(w, w + wl).join(' '));
              if (isName(ph1)) { name = ph1; break outer1; }
            }
          }
        }
      }

      // Strategy B: name BEFORE tracking code on same line
      if (name === '-') {
        var beforeRaw = line.substring(0, trkIdx).replace(/[\s,;:\-|]+$/, '').trim();
        if (beforeRaw) {
          var cb = cleanName(beforeRaw);
          if (isName(cb)) {
            name = cb;
          } else {
            var bw = beforeRaw.split(/\s+/).filter(Boolean);
            outer2:
            for (var bx = bw.length; bx >= 0; bx--) {
              for (var bl = Math.min(4, bx); bl >= 2; bl--) {
                var ph2 = cleanName(bw.slice(bx - bl, bx).join(' '));
                if (isName(ph2)) { name = ph2; break outer2; }
              }
            }
          }
        }
      }

      // Strategy C: next lines (up to 2)
      if (name === '-') {
        for (var d = 1; d <= 2 && name === '-'; d++) {
          if (i + d < lines.length && lines[i + d]) {
            var nxtUpper = upperLines[i + d] || '';
            var nxtToks = nxtUpper.split(/[\s,;|\t]+/).filter(Boolean);
            if (nxtToks.some(isTracking)) break;
            var cn = cleanName(lines[i + d]);
            if (isName(cn)) {
              name = cn;
            } else {
              var nw = lines[i + d].replace(/[^A-Za-z\u00C0-\u00FF'\s]/g, ' ').replace(/\s+/g, ' ').trim();
              var nc = cleanName(nw);
              if (isName(nc)) name = nc;
            }
          }
        }
      }

      // Strategy D: previous lines (up to 2)
      if (name === '-') {
        for (var pd = 1; pd <= 2 && name === '-'; pd++) {
          if (i - pd >= 0 && lines[i - pd]) {
            var prvUpper = upperLines[i - pd] || '';
            var prvToks = prvUpper.split(/[\s,;|\t]+/).filter(Boolean);
            if (prvToks.some(isTracking)) break;
            var pn = cleanName(lines[i - pd]);
            if (isName(pn)) {
              name = pn;
            } else {
              var pw = lines[i - pd].replace(/[^A-Za-z\u00C0-\u00FF'\s]/g, ' ').replace(/\s+/g, ' ').trim();
              var pc = cleanName(pw);
              if (isName(pc)) name = pc;
            }
          }
        }
      }

      results.push({ name: name, tracking: trk });
    }
  }
  return results;
}

// -------------------------------------------------------
// RAW BUFFER EXTRACTOR (fallback for legacy .doc)
// Scans binary for readable ASCII/Latin strings
// -------------------------------------------------------
function extractRawFromBuffer(arrayBuffer) {
  // For WPS/OLE .doc files, text is stored in UTF-16LE encoding.
  // Scan pairs of bytes: if hi byte = 0, lo byte is the ASCII character.
  // This is the ONLY strategy needed - do NOT mix with raw ASCII scan
  // (ASCII scan picks up image data and OLE metadata, producing garbage).
  var bytes = new Uint8Array(arrayBuffer);
  var result = '';
  var current = '';

  for (var i = 0; i < bytes.length - 1; i += 2) {
    var lo = bytes[i];
    var hi = bytes[i + 1];

    if (hi === 0 && lo >= 32 && lo <= 126) {
      // Printable ASCII character in UTF-16LE
      current += String.fromCharCode(lo);
    } else if (hi === 0 && (lo === 10 || lo === 13)) {
      // Newline in UTF-16LE
      if (current.trim().length >= 3) {
        result += current.trim() + '\n';
      }
      current = '';
    } else if (hi <= 5 && lo >= 0xC0) {
      // Extended Latin (accented chars like à è ì ò ù) in UTF-16LE
      current += String.fromCharCode((hi << 8) | lo);
    } else {
      // Non-text byte pair: flush current string
      if (current.trim().length >= 3) {
        result += current.trim() + ' ';
      }
      current = '';
    }
  }
  if (current.trim().length >= 3) result += current.trim();
  return result;
}

// -------------------------------------------------------
// FILE READERS
// -------------------------------------------------------
function readDocx(file) {
  return new Promise(function(res, rej) {
    var r = new FileReader();
    r.onload = function(e) {
      console.log('File loaded: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)');
      var buf = e.target.result;
      var ext = file.name.split('.').pop().toLowerCase();

      // .doc (WPS Office OLE format): Mammoth returns partial results.
      // Go straight to raw UTF-16LE buffer extraction — much more reliable.
      if (ext === 'doc') {
        console.log('DOC file: skipping Mammoth, using raw buffer extraction');
        var raw = extractRawFromBuffer(buf);
        console.log('Extracted text preview (raw UTF-16LE):');
        console.log(raw.substring(0, 200));
        res(parseText(raw));
        return;
      }

      // .docx: use Mammoth normally
      mammoth.extractRawText({ arrayBuffer: buf })
        .then(function(o) {
          var text = o.value || '';
          if (text.trim().length > 0) {
            console.log('Extracted text preview (mammoth):');
            console.log(text.substring(0, 200));
            res(parseText(text));
          } else {
            console.log('Mammoth empty, trying raw buffer');
            var raw = extractRawFromBuffer(buf);
            console.log('Extracted text preview (raw):');
            console.log(raw.substring(0, 200));
            res(parseText(raw));
          }
        })
        .catch(function(err) {
          console.log('Mammoth error: ' + err + ', trying raw buffer');
          var raw = extractRawFromBuffer(buf);
          console.log('Extracted text preview (raw fallback):');
          console.log(raw.substring(0, 200));
          res(parseText(raw));
        });
    };
    r.onerror = rej;
    r.readAsArrayBuffer(file);
  });
}

function readExcel(file) {
  return new Promise(function(res, rej) {
    var r = new FileReader();
    r.onload = function(e) {
      console.log('File loaded: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)');
      setTimeout(function() {
        try {
          var wb = XLSX.read(e.target.result, {
            type: 'array',
            cellStyles: false,
            cellNF: false,
            cellFormula: false,
            sheetStubs: false
          });
          var allText = '';
          for (var si = 0; si < wb.SheetNames.length; si++) {
            var ws = wb.Sheets[wb.SheetNames[si]];
            var json = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '' });
            for (var ri = 0; ri < json.length; ri++) {
              var rowStr = json[ri].map(function(c) { return String(c || '').trim(); }).filter(Boolean).join('\t');
              if (rowStr) allText += rowStr + '\n';
            }
          }
          console.log('Extracted text preview (xlsx):');
          console.log(allText.substring(0, 200));
          var parsed = parseText(allText);
          if (!parsed.length) {
            console.log('parseText empty, trying column fallback');
            var ws0 = wb.Sheets[wb.SheetNames[0]];
            var json0 = XLSX.utils.sheet_to_json(ws0, { header: 1, raw: false, defval: '' });
            if (json0.length > 1) {
              var cols = json0[0].map(function(c) { return String(c || '').trim(); });
              var rows = json0.slice(1);
              var ct = autoCols(cols);
              parsed = rows.filter(function(row) { return row[ct.ti]; }).map(function(row) {
                return {
                  name: cleanName(String(row[ct.ci] || '')),
                  tracking: String(row[ct.ti]).trim().replace(/\s/g, '').toUpperCase()
                };
              }).filter(function(entry) { return isTracking(entry.tracking); });
            }
          }
          console.log('Excel done: ' + parsed.length + ' entries');
          res(parsed);
        } catch(err) {
          console.log('Excel error: ' + err);
          rej(err);
        }
      }, 10);
    };
    r.onerror = rej;
    r.readAsArrayBuffer(file);
  });
}

function readCsv(file) {
  return new Promise(function(res, rej) {
    var r = new FileReader();
    r.onload = function(e) {
      console.log('File loaded: ' + file.name);
      console.log('Extracted text preview (csv):');
      console.log((e.target.result || '').substring(0, 200));
      try { res(parseText(e.target.result)); } catch(err) { rej(err); }
    };
    r.onerror = rej;
    r.readAsText(file, 'UTF-8');
  });
}

function autoCols(cols) {
  var ck = ['cliente','client','nome','name','customer','destinatario','receiver'];
  var tk = ['tracking','track','spedizione','codice','awb','shipment','numero','code','number'];
  var ci = 0, ti = cols.length > 1 ? 1 : 0;
  cols.forEach(function(c, i) {
    var cl = c.toLowerCase();
    if (ck.some(function(k) { return cl.indexOf(k) !== -1; })) ci = i;
    if (tk.some(function(k) { return cl.indexOf(k) !== -1; })) ti = i;
  });
  return { ci: ci, ti: ti };
}

// -------------------------------------------------------
// FILE UPLOAD - device adaptive
// label triggers #fi (iPhone safe)
// dropzone = drag & drop (desktop/iPad only via CSS)
// -------------------------------------------------------
var fi = document.getElementById('fi');
var dropzone = document.getElementById('dropzone');

fi.addEventListener('change', function() {
  var selected = Array.prototype.slice.call(fi.files);
  if (selected.length) handleFiles(selected);
  try { fi.value = ''; } catch(e) {}
});

dropzone.addEventListener('dragover', function(e) {
  e.preventDefault();
  dropzone.classList.add('drag-over');
});
dropzone.addEventListener('dragleave', function() {
  dropzone.classList.remove('drag-over');
});
dropzone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  var dropped = Array.prototype.slice.call(e.dataTransfer.files);
  if (dropped.length) handleFiles(dropped);
});
dropzone.addEventListener('click', function() { fi.click(); });

function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg || 'Lettura in corso...';
  document.getElementById('loadingBar').classList.add('visible');
}
function hideLoading() {
  document.getElementById('loadingBar').classList.remove('visible');
}

async function handleFiles(rawFiles) {
  var supported = rawFiles.filter(function(f) {
    return /\.(doc|docx|xlsx|xls|csv|txt)$/i.test(f.name);
  });
  if (!supported.length) {
    notify('Usa file .doc .docx .xlsx .csv o .txt', 'err');
    return;
  }
  showLoading('Lettura in corso... (' + supported.length + ' file)');
  for (var i = 0; i < supported.length; i++) {
    var f = supported[i];
    var sizeMB = (f.size / 1024 / 1024).toFixed(1);
    var entry = { name: f.name, type: f.name.split('.').pop().toLowerCase(), count: 0, status: 'loading' };
    files.push(entry);
    renderFiles();
    showLoading('Lettura: ' + f.name + ' (' + sizeMB + ' MB)...');
    try {
      var rows = [];
      if (entry.type === 'docx' || entry.type === 'doc') {
        rows = await readDocx(f);
      } else if (entry.type === 'xlsx' || entry.type === 'xls') {
        rows = await readExcel(f);
      } else {
        rows = await readCsv(f);
      }
      var existing = {};
      codes.forEach(function(c) { existing[c.tracking] = true; });
      var added = 0;
      rows.forEach(function(row) {
        if (!row.tracking || existing[row.tracking]) return;
        codes.push(row);
        existing[row.tracking] = true;
        added++;
      });
      entry.count = added;
      entry.status = 'ok';
    } catch(err) {
      entry.status = 'error';
      console.log('Error reading ' + f.name + ': ' + err);
      notify('Errore: ' + f.name + ' - File non supportato o troppo grande. Usa input manuale.', 'err');
    }
    renderFiles();
  }
  hideLoading();
  save();
  renderAll();
}

// -------------------------------------------------------
// MANUAL ADD
// -------------------------------------------------------
function addManual() {
  var tr = document.getElementById('manTrack').value.trim().replace(/\s/g, '').toUpperCase();
  var rawName = document.getElementById('manName').value.trim();
  var name = rawName ? (cleanName(rawName) || rawName) : '-';
  if (!tr) { notify('Inserisci il codice tracking', 'err'); return; }
  if (codes.some(function(c) { return c.tracking === tr; })) { notify('Codice gia presente', 'info'); return; }
  codes.push({ name: name, tracking: tr });
  document.getElementById('manTrack').value = '';
  document.getElementById('manName').value = '';
  save();
  renderAll();
  notify('Codice aggiunto', 'ok');
}

document.getElementById('manTrack').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addManual();
});

function removeCode(idx) {
  codes.splice(idx, 1);
  save();
  renderAll();
}

// -------------------------------------------------------
// RESET
// -------------------------------------------------------
function resetAll() {
  if (codes.length && !confirm('Eliminare tutti i codici e i file caricati?')) return;
  // Clear state
  codes = [];
  files = [];
  // Clear localStorage completely
  try { localStorage.clear(); } catch(e) {}
  // Reset all UI elements manually
  document.getElementById('fileList').innerHTML = '';
  document.getElementById('ordersList').innerHTML = '';
  document.getElementById('bulkLinks').innerHTML = '';
  document.getElementById('searchInput').value = '';
  // Hide sections
  setVisible('statsBar', false);
  setVisible('bulkSection', false);
  setVisible('ordersCard', false);
  // Reset stats
  document.getElementById('sTot').textContent = '0';
  document.getElementById('sNamed').textContent = '0';
  document.getElementById('sAnon').textContent = '0';
  notify('Tutto eliminato', 'info');
}

// -------------------------------------------------------
// 17TRACK URLS
// -------------------------------------------------------
function trackingUrl(code) {
  return 'https://t.17track.net/en#nums=' + encodeURIComponent(code);
}
function bulkUrl(chunk) {
  return 'https://t.17track.net/en#nums=' + chunk.map(function(c) { return c.tracking; }).join(',');
}
function chunkArray(arr, n) {
  var r = [];
  for (var i = 0; i < arr.length; i += n) r.push(arr.slice(i, i + n));
  return r;
}

// -------------------------------------------------------
// RENDER
// -------------------------------------------------------
function renderAll() {
  renderStats();
  renderBulk();
  renderOrders();
  var has = codes.length > 0;
  setVisible('statsBar', has);
  setVisible('bulkSection', has);
  setVisible('ordersCard', has);
}

function setVisible(id, show) {
  var el = document.getElementById(id);
  if (show) el.classList.remove('hidden');
  else el.classList.add('hidden');
}

function renderFiles() {
  var list = document.getElementById('fileList');
  if (!files.length) { list.innerHTML = ''; return; }
  list.innerHTML = files.map(function(f, i) {
    return '<div class="fi ' + f.status + '">'
      + '<div class="fi-l">'
      + '<span style="font-size:18px">' + (f.type === 'docx' || f.type === 'doc' ? '&#x1F4DD;' : '&#x1F4CA;') + '</span>'
      + '<div><div class="fi-name">' + esc(f.name) + '</div>'
      + '<div class="fi-n">' + (f.status === 'ok' ? f.count + ' nuovi codici' : f.status === 'loading' ? 'lettura...' : 'errore') + '</div>'
      + '</div></div>'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<span class="fi-badge ' + f.status + '">' + (f.status === 'ok' ? '&#x2713;' : f.status === 'loading' ? '&#x23F3;' : '&#x2717;') + '</span>'
      + '<button class="btn-del" onclick="files.splice(' + i + ',1);renderFiles()">&#xD7;</button>'
      + '</div></div>';
  }).join('');
}

function renderStats() {
  var named = codes.filter(function(c) { return c.name && c.name !== '-'; }).length;
  document.getElementById('sTot').textContent = codes.length;
  document.getElementById('sNamed').textContent = named;
  document.getElementById('sAnon').textContent = codes.length - named;
}

function renderBulk() {
  var wrap = document.getElementById('bulkLinks');
  if (!codes.length) { wrap.innerHTML = ''; return; }
  var chunks = chunkArray(codes, MAX_PER_LINK);
  wrap.innerHTML = chunks.map(function(ch, i) {
    var url = bulkUrl(ch);
    var label = chunks.length === 1
      ? 'Traccia tutti i ' + codes.length + ' codici su 17Track'
      : 'Gruppo ' + (i + 1) + '/' + chunks.length + ' - ' + ch.length + ' codici';
    var sub = chunks.length === 1
      ? codes.length + ' codici - ideale su iPad e desktop'
      : 'Codici ' + (i * MAX_PER_LINK + 1) + '-' + Math.min((i + 1) * MAX_PER_LINK, codes.length);
    return '<a href="' + url + '" target="_blank" rel="noopener" class="bulk-link">'
      + '<span style="flex:1;text-align:center">&#x1F50D; ' + label
      + '<span class="bulk-link-sub">' + sub + '</span></span></a>';
  }).join('');
}

function renderOrders() {
  var list = document.getElementById('ordersList');
  var q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  var filtered = q
    ? codes.filter(function(c) {
        return c.name.toLowerCase().indexOf(q) !== -1 || c.tracking.toLowerCase().indexOf(q) !== -1;
      })
    : codes;
  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;padding:28px;color:var(--muted)">Nessun risultato</div>';
    return;
  }
  list.innerHTML = filtered.map(function(c, i) {
    var realIdx = codes.indexOf(c);
    var url = trackingUrl(c.tracking);
    return '<div class="orow" style="animation-delay:' + (i * 0.02) + 's">'
      + '<div class="orow-num">' + (realIdx + 1) + '</div>'
      + '<div class="orow-info">'
      + '<div class="orow-name">' + esc(c.name && c.name !== '-' ? c.name : '-') + '</div>'
      + '<div class="orow-track">' + esc(c.tracking) + '</div>'
      + '</div>'
      + '<div class="orow-btns">'
      + '<a href="' + url + '" target="_blank" rel="noopener" class="track-one">&#x1F50D; Traccia</a>'
      + '<button class="btn-del" onclick="removeCode(' + realIdx + ')">&#xD7;</button>'
      + '</div></div>';
  }).join('');
}

// -------------------------------------------------------
// UTILS
// -------------------------------------------------------
function notify(msg, type) {
  type = type || 'ok';
  var n = document.getElementById('notif');
  n.textContent = msg;
  n.className = 'notif ' + type + ' show';
  clearTimeout(n._t);
  n._t = setTimeout(function() { n.classList.remove('show'); }, 3500);
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// -------------------------------------------------------
// PWA INSTALL
// -------------------------------------------------------
var _installPrompt = null;

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  _installPrompt = e;
  document.getElementById('installBtn').style.display = 'flex';
});

window.addEventListener('appinstalled', function() {
  document.getElementById('installBtn').style.display = 'none';
  _installPrompt = null;
  notify('App aggiunta alla schermata home!', 'ok');
});

function installApp() {
  if (_installPrompt) {
    _installPrompt.prompt();
    _installPrompt.userChoice.then(function(result) {
      if (result.outcome === 'accepted') {
        document.getElementById('installBtn').style.display = 'none';
      }
      _installPrompt = null;
    });
  } else {
    // iOS Safari: show manual instructions
    notify('Su iPhone: tasto Condividi → "Aggiungi a schermata Home"', 'info');
  }
}

// -------------------------------------------------------
// INIT
// -------------------------------------------------------
(function() {
  if (codes.length) {
    renderAll();
    notify(codes.length + ' codici ripristinati', 'info');
  }
})();
</script>
